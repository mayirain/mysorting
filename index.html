<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Lab Selection Sort</title>
    <style>
        :root {
            --primary: #4a90e2;   /* Biru: Standar */
            --secondary: #f1c40f; /* Kuning: Nilai Terkecil Sementara */
            --success: #2ecc71;   /* Hijau: Sudah Urut */
            --danger: #e74c3c;    /* Merah: Sedang Membandingkan */
            --bg: #f8f9fa;
            --text: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 650px;
            text-align: center;
        }

        h1 { margin-bottom: 0.5rem; color: var(--primary); }
        p { color: #7f8c8d; margin-bottom: 1.5rem; }

        .visualizer {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            height: 200px;
            gap: 8px;
            margin: 20px 0;
            padding: 10px;
            background: #fdfdfd;
            border-bottom: 3px solid #eee;
        }

        .bar {
            flex: 1;
            background-color: var(--primary);
            border-radius: 4px 4px 0 0;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            min-width: 30px;
        }

        .bar span {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            font-weight: bold;
        }

        .compare { background-color: var(--danger) !important; transform: scaleY(1.05); }
        .is-min { background-color: var(--secondary) !important; box-shadow: 0 0 10px var(--secondary); }
        .sorted { background-color: var(--success) !important; }

        .info-box {
            background: #eef2f7;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            min-height: 45px;
            border-left: 5px solid var(--primary);
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            background: var(--primary);
            color: white;
        }

        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }
        
        #speed { cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Lab Selection Sort</h1>
        <p>Cari nilai terkecil, lalu pindahkan ke posisi terdepan!</p>

        <div class="visualizer" id="container"></div>

        <div class="info-box" id="step-info">
            Siap belajar? Klik tombol di bawah untuk mencari nilai terkecil.
        </div>

        <div class="controls">
            <button id="startBtn" onclick="selectionSort()">Mulai Pengurutan</button>
            <button onclick="resetData()">Acak Data Baru</button>
            <div style="display: flex; align-items: center; gap: 5px; margin-left: 10px;">
                <small>Lambat</small>
                <input type="range" id="speed" min="100" max="1000" value="500" dir="rtl">
                <small>Cepat</small>
            </div>
        </div>
    </div>

    <script>
        let data = [30, 50, 10, 40, 5, 20];
        const container = document.getElementById('container');
        const info = document.getElementById('step-info');
        const speedInput = document.getElementById('speed');
        const startBtn = document.getElementById('startBtn');

        function render(compareIdx = -1, minIdx = -1, sortedCount = 0) {
            container.innerHTML = '';
            data.forEach((val, i) => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = `${val * 2.5}px`;
                
                if (i < sortedCount) bar.classList.add('sorted');
                else if (i === minIdx) bar.classList.add('is-min');
                else if (i === compareIdx) bar.classList.add('compare');
                
                bar.innerHTML = `<span>${val}</span>`;
                container.appendChild(bar);
            });
        }

        function resetData() {
            data = Array.from({length: 8}, () => Math.floor(Math.random() * 60) + 5);
            info.innerText = "Data baru siap dianalisis!";
            startBtn.disabled = false;
            render();
        }

        const sleep = () => new Promise(r => setTimeout(r, 1100 - speedInput.value));

        async function selectionSort() {
            startBtn.disabled = true;
            let n = data.length;

            for (let i = 0; i < n; i++) {
                let minIdx = i;
                info.innerHTML = `📍 Putaran ${i+1}: Mencari yang terkecil mulai dari indeks ke-${i}.`;
                render(-1, minIdx, i);
                await sleep();

                for (let j = i + 1; j < n; j++) {
                    info.innerHTML = `🔎 Memeriksa apakah <b>${data[j]}</b> < <b>${data[minIdx]}</b>?`;
                    render(j, minIdx, i);
                    await sleep();

                    if (data[j] < data[minIdx]) {
                        minIdx = j;
                        info.innerHTML = `⭐ Ketemu! Nilai terkecil sementara sekarang adalah <b>${data[minIdx]}</b>.`;
                        render(-1, minIdx, i);
                        await sleep();
                    }
                }

                if (minIdx !== i) {
                    info.innerHTML = `🔄 Menukar <b>${data[minIdx]}</b> ke posisi depan (indeks ke-${i}).`;
                    [data[i], data[minIdx]] = [data[minIdx], data[i]];
                    render(-1, i, i);
                    await sleep();
                } else {
                    info.innerHTML = `✅ <b>${data[i]}</b> sudah di posisi yang benar.`;
                    await sleep();
                }
                
                render(-1, -1, i + 1);
            }
            info.innerHTML = "✨ <b>Selesai!</b> Semua nilai terkecil sudah dipindahkan ke tempatnya.";
        }

        render();
    </script>
</body>
</html>
